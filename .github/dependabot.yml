version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    # Group minor/patch bumps into a single PR to reduce noise.
    groups:
      python-dependencies:
        update-types:
          - minor
          - patch
