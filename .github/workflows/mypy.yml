name: MyPy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Extracted to fingoldo/py-ci-shared (2026-07-09): identical logic to mlframe's own beachhead
# workflow. The bare full-repo advisory pass was already removed 2026-07-09 (see mypy-full.yml
# for the whole-project pass with real deps installed); this is just the strict-mode beachhead.
permissions:
  contents: read

jobs:
  mypy-beachhead:
    uses: fingoldo/py-ci-shared/.github/workflows/mypy-beachhead.yml@4e821c3982aa3a3f24d3026e7a77fab872819c0a  # v1.0.0
    with:
      modules: |
        src/pyutilz/dev/code_audit
        src/pyutilz/stats
      mypy-version: "2.1.0"
      extra-deps: |
        numpy<2.5
