name: MyPy-full

# Whole-project mypy check, separate from the fast mypy.yml strict-mode beachhead. Extracted to
# fingoldo/py-ci-shared (2026-07-09); the install-command below mirrors ci.yml's `test` job
# install step (all runtime extras except [gpu]/[dash]/[prefect]/[tensorflow], which have no
# current type-checked consumer). `advisory: true` (the reusable workflow's default) because this
# backlog is NOT yet closed to 0, unlike mlframe's -- see the reusable workflow's header comment
# for why that's a per-repo choice, never a hardcoded blocking default.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mypy-full:
    uses: fingoldo/py-ci-shared/.github/workflows/mypy-full.yml@master
    with:
      package-name: pyutilz
      mypy-version: "2.1.0"
      advisory: true
      install-command: |
        uv pip install --system -e ".[pandas,polars,database,system,llm,nlp,cloud,dev]"
