name: MyPy

# Whole-project mypy check (the fast strict-mode beachhead workflow was retired). Extracted to
# fingoldo/py-ci-shared (2026-07-09); the install-command below mirrors ci.yml's `test` job
# install step (all runtime extras except [gpu]/[dash]/[prefect]/[tensorflow], which have no
# current type-checked consumer). `advisory: false` (real blocking gate) as of 2026-07-13:
# `mypy src/pyutilz` verified clean (0 errors, 113 source files) -- backlog is closed, same
# posture as mlframe's mypy-full.yml. Flip back to advisory only if a future dependency-version
# bump reopens the backlog wider than a same-PR fix.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mypy-full:
    uses: fingoldo/py-ci-shared/.github/workflows/mypy-full.yml@f26052fd4fee0d667aa6f4c3290d77e7ca6c1c06  # v1.2.0
    with:
      package-name: pyutilz
      mypy-version: "2.1.0"
      advisory: false
      install-command: |
        uv pip install --system -e ".[pandas,polars,database,system,llm,nlp,cloud,dev]"
