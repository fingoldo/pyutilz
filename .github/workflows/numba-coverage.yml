name: numba-coverage-nightly

# @njit-compiled kernel bodies are invisible to coverage.py under normal JIT execution (the
# machine code coverage.py's settrace hooks see is not the traced Python bytecode) -- see
# CLAUDE.md memory reference_numba_coverage_blind. This nightly job reruns the test suites that
# exercise numba kernels (numbalib.py, similarity.py's sentences_similarity_numba twin,
# performance/kernel_tuning/, stats/normality.py) with NUMBA_DISABLE_JIT=1 so those kernel
# bodies run as plain interpreted Python and coverage.py can actually see them. Mirrors
# mlframe's numba-coverage.yml, ported 2026-07-09.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  numba-disabled-coverage:
    name: pytest with NUMBA_DISABLE_JIT=1 (kernel-body coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NUMBA_DISABLE_JIT: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install pyutilz with all runtime extras + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pandas,polars,database,system,llm,nlp,cloud,dev]"

      - name: Show installed versions
        run: |
          python -c "import numba; print('numba', numba.__version__)"
          python -c "import os; print('NUMBA_DISABLE_JIT =', os.environ.get('NUMBA_DISABLE_JIT'))"

      - name: Run numba-kernel-touching suites with NUMBA_DISABLE_JIT=1
        run: |
          pytest -p no:randomly \
            --cov=src/pyutilz \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=120 \
            tests/test_numbalib.py \
            tests/test_similarity.py \
            tests/stats/test_normality.py \
            tests/performance/kernel_tuning/

      - name: Upload coverage XML as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-numba-disabled
          path: coverage.xml

      - name: Upload coverage to Codecov (numba-disabled flag)
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac  # v5
        if: success()
        with:
          files: ./coverage.xml
          flags: numba-disabled
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
