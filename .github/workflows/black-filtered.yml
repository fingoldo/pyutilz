name: Black

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Extracted to fingoldo/py-ci-shared (2026-07-09): identical logic to mlframe's own Black
# workflow, script now lives in the shared py_ci_shared package instead of scripts/ here.
jobs:
  black:
    uses: fingoldo/py-ci-shared/.github/workflows/black-filtered.yml@acf3f712ec7e00fd23880cf20be8842bc5c2cc07  # v1.0.1: pins uvx black to an exact version
    with:
      check-path: "."
