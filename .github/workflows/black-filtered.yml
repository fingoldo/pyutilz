name: Black

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Extracted to fingoldo/py-ci-shared (2026-07-09): identical logic to mlframe's own Black
# workflow, script now lives in the shared py_ci_shared package instead of scripts/ here.
jobs:
  black:
    uses: fingoldo/py-ci-shared/.github/workflows/black-filtered.yml@v1.0.0
    with:
      check-path: "."
