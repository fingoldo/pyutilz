name: Black

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Extracted to fingoldo/py-ci-shared (2026-07-09): identical logic to mlframe's own Black
# workflow, script now lives in the shared py_ci_shared package instead of scripts/ here.
jobs:
  black:
    uses: fingoldo/py-ci-shared/.github/workflows/black-filtered.yml@1fd408df105f2a7d22d36a239d94a39ef888305a  # v1.2.1
    with:
      check-path: "."
