name: Black

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Extracted to fingoldo/py-ci-shared (2026-07-09): identical logic to mlframe's own Black
# workflow, script now lives in the shared py_ci_shared package instead of scripts/ here.
jobs:
  black:
    uses: fingoldo/py-ci-shared/.github/workflows/black-filtered.yml@f26052fd4fee0d667aa6f4c3290d77e7ca6c1c06  # v1.2.0
    with:
      check-path: "."
