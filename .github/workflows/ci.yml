name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # The library is Windows-heavy (pywin32, portalocker, Windows path/mkstemp behavior):
          # exercise at least one Windows leg so Windows-specific regressions are caught.
          - os: windows-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      # [nlp] pulls in spacy -> thinc>=8.3.12, which requires python>=3.10; drop it on
      # 3.8/3.9 legs (pre-existing gap: this was failing "Install dependencies" outright
      # on those legs, unrelated to python_version's own end of upstream support).
      # [llm] pulls in google-genai>=1.0, which requires python>=3.9 (PyPI-declared
      # Requires-Python floor, true since google-genai's first release) -- unusable on
      # the 3.8 leg. Rather than dropping [llm] wholesale (factory.py eagerly imports
      # pydantic-settings, breaking collection for every llm test), install the same
      # [llm] package set MINUS google-genai directly on 3.8: gemini-specific tests
      # already guard with pytest.importorskip("google.genai") (see test_audit_providers.py,
      # test_llm_account_credits.py, test_llm_live.py), so they skip cleanly instead of
      # erroring, and every other provider's tests run unaffected.
      # shell: bash explicitly -- windows-latest runners default `run:` to pwsh, which
      # doesn't understand this bash conditional syntax. PYVER is passed via env: rather
      # than interpolated directly into the script (${{ }} inside a shell command is a
      # documented anti-pattern -- shellcheck/actionlint flag it (SC2102) and it's a
      # latent injection risk if the expression value were ever less trusted).
      shell: bash
      env:
        PYVER: ${{ matrix.python-version }}
      run: |
        python -m pip install --upgrade pip
        if [[ "$PYVER" == "3.8" ]]; then
          pip install -e ".[pandas,polars,database,system,cloud,dev]"
          pip install "anthropic>=0.40" "httpx>=0.25" "tenacity>=8.0" "pydantic>=2.0" "pydantic-settings>=2.0" "tiktoken>=0.5"
        elif [[ "$PYVER" == "3.9" ]]; then
          pip install -e ".[pandas,polars,database,system,llm,cloud,dev]"
        else
          pip install -e ".[pandas,polars,database,system,llm,nlp,cloud,dev]"
        fi

    - name: Run tests with coverage
      run: |
        pytest --cov=src/pyutilz --cov-report=xml --cov-report=term-missing --cov-fail-under=60

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install linting tools
      run: pip install ruff black bandit actionlint-py shellcheck-py vulture pip-audit

    # Blocking gate: real-bug ruff codes (pyflakes + syntax errors) must pass.
    - name: Ruff (real bugs - blocking)
      run: ruff check . --select F,E9

    # Non-blocking: full style pass while legacy debt is worked down.
    - name: Ruff (full - advisory)
      run: ruff check .
      continue-on-error: true

    # mypy (both the advisory full-repo pass and the strict-mode beachhead) moved to
    # its own workflow (mypy.yml) so it gets an independent, honest badge instead of
    # being buried as a step inside this combined lint job.

    - name: Bandit security scan
      run: bandit -r src -ll -f json -o bandit-report.json
      continue-on-error: true

    - name: Upload bandit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json

    # Blocking: mirrors the pre-commit actionlint hook so a workflow-file bug
    # (bad expression, duplicate key, unknown runner label, shell-syntax error
    # in a run: block) can't reach master even via --no-verify.
    - name: Actionlint (workflow files)
      run: actionlint

    # Advisory: dead-code scan. Real false-positive rate on dynamic-dispatch
    # code (lazy-import proxies, pydantic fields, pytest fixtures) makes this
    # unsuitable as a blocking gate; mirrors the bandit step's posture.
    - name: Vulture dead-code scan
      run: vulture src/pyutilz scripts/vulture_whitelist.py --min-confidence 80
      continue-on-error: true

    # Advisory: known-vulnerability scan against installed dependency versions
    # (bandit only checks code PATTERNS, not whether a pinned dependency has a
    # published CVE -- a different and complementary risk class).
    - name: pip-audit dependency vulnerability scan
      run: pip-audit --desc -f json -o pip-audit-report.json || true
      continue-on-error: true

    - name: Upload pip-audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pip-audit-report
        path: pip-audit-report.json
