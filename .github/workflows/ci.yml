name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # The library is Windows-heavy (pywin32, portalocker, Windows path/mkstemp behavior):
          # exercise at least one Windows leg so Windows-specific regressions are caught.
          - os: windows-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[pandas,polars,database,system,llm,nlp,cloud,dev]

    - name: Run tests with coverage
      run: |
        pytest --cov=src/pyutilz --cov-report=xml --cov-report=term-missing --cov-fail-under=60

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install linting tools
      run: pip install ruff black mypy bandit

    # Blocking gate: real-bug ruff codes (pyflakes + syntax errors) must pass.
    - name: Ruff (real bugs - blocking)
      run: ruff check . --select F,E9

    # Non-blocking: full style pass while legacy debt is worked down.
    - name: Ruff (full - advisory)
      run: ruff check .
      continue-on-error: true

    - name: mypy (advisory)
      run: mypy src/pyutilz
      continue-on-error: true

    # Blocking: mirrors the pre-commit mypy hook's strict-mode beachhead (see
    # [tool.mypy.overrides] in pyproject.toml) so a commit that passes locally
    # cannot silently regress once pushed. numpy pinned <2.5: 2.5+'s bundled
    # .pyi stubs use PEP 695 `type` statements that mypy rejects under
    # python_version="3.10" ("Type statement is only supported in Python 3.12
    # and greater").
    - name: MyPy (strict-mode beachhead)
      run: |
        pip install "numpy<2.5"
        mypy src/pyutilz/dev/code_audit src/pyutilz/stats

    - name: Bandit security scan
      run: bandit -r src -ll -f json -o bandit-report.json
      continue-on-error: true

    - name: Upload bandit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json
