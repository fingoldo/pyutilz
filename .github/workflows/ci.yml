name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # The library is Windows-heavy (pywin32, portalocker, Windows path/mkstemp behavior):
          # exercise at least one Windows leg so Windows-specific regressions are caught.
          - os: windows-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      # [nlp] pulls in spacy -> thinc>=8.3.12, which requires python>=3.10; drop it on
      # 3.8/3.9 legs (pre-existing gap: this was failing "Install dependencies" outright
      # on those legs, unrelated to python_version's own end of upstream support).
      # [llm] pulls in google-genai>=1.0, which requires python>=3.9 (PyPI-declared
      # Requires-Python floor, true since google-genai's first release) -- unusable on
      # the 3.8 leg. Rather than dropping [llm] wholesale (factory.py eagerly imports
      # pydantic-settings, breaking collection for every llm test), install the same
      # [llm] package set MINUS google-genai directly on 3.8: gemini-specific tests
      # already guard with pytest.importorskip("google.genai") (see test_audit_providers.py,
      # test_llm_account_credits.py, test_llm_live.py), so they skip cleanly instead of
      # erroring, and every other provider's tests run unaffected.
      # shell: bash explicitly -- windows-latest runners default `run:` to pwsh, which
      # doesn't understand this bash conditional syntax.
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [[ "${{ matrix.python-version }}" == "3.8" ]]; then
          pip install -e .[pandas,polars,database,system,cloud,dev]
          pip install "anthropic>=0.40" "httpx>=0.25" "tenacity>=8.0" "pydantic>=2.0" "pydantic-settings>=2.0" "tiktoken>=0.5"
        elif [[ "${{ matrix.python-version }}" == "3.9" ]]; then
          pip install -e .[pandas,polars,database,system,llm,cloud,dev]
        else
          pip install -e .[pandas,polars,database,system,llm,nlp,cloud,dev]
        fi

    - name: Run tests with coverage
      run: |
        pytest --cov=src/pyutilz --cov-report=xml --cov-report=term-missing --cov-fail-under=60

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: pyproject.toml

    # mypy pinned: an unpinned resolve picked up a newer release that flagged a
    # method-assign error in src/pyutilz/__init__.py's lazy-import-proxy machinery
    # (pulled in transitively via import-following, outside the intended beachhead
    # scope) that mypy 2.1.0 does not raise. Pin for determinism between local dev
    # and CI until that's separately investigated.
    - name: Install linting tools
      run: pip install ruff black "mypy==2.1.0" bandit

    # Blocking gate: real-bug ruff codes (pyflakes + syntax errors) must pass.
    - name: Ruff (real bugs - blocking)
      run: ruff check . --select F,E9

    # Non-blocking: full style pass while legacy debt is worked down.
    - name: Ruff (full - advisory)
      run: ruff check .
      continue-on-error: true

    - name: mypy (advisory)
      run: mypy src/pyutilz
      continue-on-error: true

    # Blocking: mirrors the pre-commit mypy hook's strict-mode beachhead (see
    # [tool.mypy.overrides] in pyproject.toml) so a commit that passes locally
    # cannot silently regress once pushed. numpy pinned <2.5: 2.5+'s bundled
    # .pyi stubs use PEP 695 `type` statements that mypy rejects under
    # python_version="3.10" ("Type statement is only supported in Python 3.12
    # and greater").
    - name: MyPy (strict-mode beachhead)
      run: |
        pip install "numpy<2.5"
        mypy --follow-imports=silent src/pyutilz/dev/code_audit src/pyutilz/stats

    - name: Bandit security scan
      run: bandit -r src -ll -f json -o bandit-report.json
      continue-on-error: true

    - name: Upload bandit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json
