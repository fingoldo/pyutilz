name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # The library is Windows-heavy (pywin32, portalocker, Windows path/mkstemp behavior):
          # exercise at least one Windows leg so Windows-specific regressions are caught.
          - os: windows-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install dependencies
      # [nlp] pulls in spacy -> thinc>=8.3.12, which requires python>=3.10; drop it on
      # 3.8/3.9 legs (pre-existing gap: this was failing "Install dependencies" outright
      # on those legs, unrelated to python_version's own end of upstream support).
      # [llm] pulls in google-genai>=1.0, which requires python>=3.9 (PyPI-declared
      # Requires-Python floor, true since google-genai's first release) -- unusable on
      # the 3.8 leg. Rather than dropping [llm] wholesale (factory.py eagerly imports
      # pydantic-settings, breaking collection for every llm test), install the same
      # [llm] package set MINUS google-genai directly on 3.8: gemini-specific tests
      # already guard with pytest.importorskip("google.genai") (see test_audit_providers.py,
      # test_llm_account_credits.py, test_llm_live.py), so they skip cleanly instead of
      # erroring, and every other provider's tests run unaffected.
      # shell: bash explicitly -- windows-latest runners default `run:` to pwsh, which
      # doesn't understand this bash conditional syntax. PYVER is passed via env: rather
      # than interpolated directly into the script (${{ }} inside a shell command is a
      # documented anti-pattern -- shellcheck/actionlint flag it (SC2102) and it's a
      # latent injection risk if the expression value were ever less trusted).
      shell: bash
      env:
        PYVER: ${{ matrix.python-version }}
      run: |
        python -m pip install --upgrade pip
        if [[ "$PYVER" == "3.8" ]]; then
          pip install -e ".[pandas,polars,database,system,cloud,dev]"
          pip install "anthropic>=0.40" "httpx>=0.25" "tenacity>=8.0" "pydantic>=2.0" "pydantic-settings>=2.0" "tiktoken>=0.5"
        elif [[ "$PYVER" == "3.9" ]]; then
          pip install -e ".[pandas,polars,database,system,llm,cloud,dev]"
        else
          pip install -e ".[pandas,polars,database,system,llm,nlp,cloud,dev]"
        fi

    - name: Run tests with coverage
      run: |
        pytest --cov=src/pyutilz --cov-report=xml --cov-report=term-missing --cov-fail-under=60

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac  # v5
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # Blocking gate + two lint bundles, all extracted to fingoldo/py-ci-shared reusable workflows
  # (2026-07-09) since their logic is identical across mlframe/pyutilz -- see
  # https://github.com/fingoldo/py-ci-shared and this repo's pyproject.toml `[tool.ruff] extend`.
  ruff-blocking:
    name: Ruff (real bugs - blocking)
    uses: fingoldo/py-ci-shared/.github/workflows/ruff-blocking.yml@76f6606202f0db95dfa87d67010f64c9e6db8574  # v1.0.0
    with:
      ignore: "C901"

  lint-blocking:
    name: lint + security (blocking, triaged clean)
    uses: fingoldo/py-ci-shared/.github/workflows/lint-blocking.yml@76f6606202f0db95dfa87d67010f64c9e6db8574  # v1.0.0
    with:
      source-path: src/pyutilz
      codespell-paths: src docs README.md CHANGELOG.md CONTRIBUTING.md TESTING.md
      vulture-whitelist-path: scripts/vulture_whitelist.py
      interrogate-source-path: src/pyutilz
      interrogate-fail-under: 100
      deptry-install-command: pip install -e ".[all,dev]"
      run-zizmor: true

  lint-advisory:
    name: lint (advisory)
    uses: fingoldo/py-ci-shared/.github/workflows/lint-advisory.yml@76f6606202f0db95dfa87d67010f64c9e6db8574  # v1.0.0
    with:
      source-path: src/pyutilz

  build:
    # Packaging sanity check on every push/PR, not just at release-tag time (publish.yml
    # already builds+twine-checks on tag push, but that's too late to catch a packaging bug --
    # by then it's the actual release). Mirrors mlframe's ci.yml build-verification job.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        persist-credentials: false

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Build distributions
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Verify distributions with twine
      run: |
        pip install twine
        twine check dist/*

    - name: Install wheel + smoke import
      run: |
        pip install dist/*.whl
        python -c "import pyutilz; print('pyutilz', pyutilz.__version__)"
