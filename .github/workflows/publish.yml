name: Publish to PyPI

# Publishes a build to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) - no API token stored in secrets.
# Configure the trusted publisher for this repo/workflow at https://pypi.org/manage/account/publishing/

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0  # full history needed for the ancestor check below

      # Gate against an arbitrary/unreviewed commit: a `v*` tag push alone does not imply the
      # tagged commit went through PR review or CI -- any Write-access collaborator could
      # otherwise tag and publish a throwaway-branch commit. Require it to be reachable from
      # master (i.e. actually landed via the normal merge process) before building/publishing.
      - name: Verify tag is reachable from master
        run: |
          git fetch origin master --depth=1000
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
            echo "::error::Tagged commit ${GITHUB_SHA} is not an ancestor of origin/master -- refusing to publish an unreviewed commit."
            exit 1
          fi

      # Without this, a maintainer who bumps the CHANGELOG heading and tags v2.0.0 but forgets
      # the pyproject.toml version edit gets a wheel silently built and published under the OLD
      # version -- permanently mismatching the git tag, and (since PyPI is immutable per-version)
      # only fixable by picking a fresh, still-higher version by hand.
      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/^version = "(.*)"$/\1/')
          if [ "${TAG_VERSION}" != "${PROJECT_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} != pyproject.toml version ${PROJECT_VERSION} -- refusing to publish a mismatched release."
            exit 1
          fi

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Run test suite
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pytest --no-cov -q

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
