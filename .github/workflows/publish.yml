name: Publish to PyPI

# Publishes a build to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) - no API token stored in secrets.
# Configure the trusted publisher for this repo/workflow at https://pypi.org/manage/account/publishing/

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0  # full history needed for the ancestor check below

      # Gate against an arbitrary/unreviewed commit: a `v*` tag push alone does not imply the
      # tagged commit went through PR review or CI -- any Write-access collaborator could
      # otherwise tag and publish a throwaway-branch commit. Require it to be reachable from
      # master (i.e. actually landed via the normal merge process) before building/publishing.
      - name: Verify tag is reachable from master
        run: |
          git fetch origin master --depth=1000
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
            echo "::error::Tagged commit ${GITHUB_SHA} is not an ancestor of origin/master -- refusing to publish an unreviewed commit."
            exit 1
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Run test suite
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pytest --no-cov -q

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
