name: docs

# Build the MkDocs site on every PR (validation) and deploy it to GitHub Pages
# on pushes to master. Enable Pages for the repo with "GitHub Actions" as the
# source for the deploy job to publish. Extracted to fingoldo/py-ci-shared (2026-07-09):
# identical logic to mlframe's own docs workflow.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    uses: fingoldo/py-ci-shared/.github/workflows/docs.yml@main
    with:
      default-branch: master
      install-command: |
        pip install -e . --no-deps
        pip install "mkdocs-material>=9.5"
