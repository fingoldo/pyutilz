# Pre-commit hooks for pyutilz.
#
# Install:
#   pip install pre-commit && pre-commit install
#
# The hook runs the meta-test suite under ``tests/test_meta/`` on every
# commit. This is exactly the set of tests designed to catch package-
# level drift: lazy-import-proxy breaks, alias-vs-target mismatches,
# top-level side-effect regressions, optional-dep contamination, and
# API-snapshot drift. Total runtime: ≈ 30 s (heavy lifting is sub-process
# isolation in PT-8 / PT-9).
#
# To skip in a hurry:
#   git commit --no-verify
#
# A ``manual``-stage variant is also defined for tight inner-loop work
# — it skips the sub-process tests (PT-8 and PT-9) and runs in ≈ 5 s:
#   pre-commit run --hook-stage=manual pyutilz-meta-tests-static-only

repos:
  # Secret-scanner -- catches accidental commits of LLM API keys
  # (sk-ant-..., sk-or-..., xai-...). Runs on every staged change.
  # Update the baseline with:
  #   detect-secrets scan > .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # _api_snapshot.json is generated from API introspection -- it holds
        # symbol NAMES (e.g. ``password_input_name``, ``pwd``) not values, which
        # trip the keyword heuristic as false positives. It can't carry a real
        # secret (defaults live in source, scanned there), so exclude it.
        exclude: '\.secrets\.baseline$|tests/test_meta/_api_snapshot\.json$'

  # Actionlint: lints .github/workflows/*.yml for syntax AND semantic bugs
  # (undefined contexts, bad expressions, unknown runner labels, duplicate keys,
  # shell-syntax errors in `run:` blocks via its bundled shellcheck integration).
  # Mirrors mlframe's setup, added 2026-07-06 after real bugs of this exact class
  # were hand-debugged there (a duplicate continue-on-error: key that silently
  # broke CI for days; a bash-conditional that broke on a Windows runner).
  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: v1.7.12.24
    hooks:
      - id: actionlint

  # Shellcheck: lints standalone .sh scripts (actionlint above covers embedded
  # `run:` blocks via its own shellcheck integration, since shellcheck-py's
  # binary is on PATH in this repo's dev environment).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Codespell: catches typos in source comments/docstrings and prose docs (README,
  # CHANGELOG, CONTRIBUTING, TESTING, mkdocs site) -- proportionally more prose surface
  # here than mlframe since docstrings are the primary documentation, not inline comments.
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ['--ignore-words-list=coo']

  # Real-bug gate: the project's FULL configured select/ignore (pyproject.toml), minus C901
  # (complexity, advisory-only). Closed to 0 findings 2026-07-09 after the RUF/G/ISC/PERF/DTZ/A/
  # T20 triage that came with adopting the shared ruff-base.toml select set -- previously this was
  # scoped to just ``--select F,E9`` (pyflakes + syntax only) while CI's full-select advisory pass
  # ran separately; now both gates check the identical rule set, matching mlframe's posture.
  #
  # CRITICAL: never use ``--select`` here. ``--select`` REPLACES the effective rule set instead of
  # narrowing pyproject.toml's configured select, silently dropping the ``ignore`` list too
  # (RUF001/002/003/022, ISC001, etc. would all reappear) and breaking RUF100's "is this noqa
  # still needed" determination. ``--ignore`` only ADDS to the configured ignore list, so it is safe.
  - repo: local
    hooks:
      - id: ruff-real-bugs
        name: "ruff (real bugs block)"
        entry: python -m ruff check --ignore C901
        language: system
        types: [python]
        # pre-commit passes matching files as explicit CLI args, which BYPASSES ruff's own
        # top-level `exclude` list in pyproject.toml (explicit paths override `exclude`; only
        # `force-exclude = true`, which this repo does not set, would apply it to explicit args
        # too). Mirror that exclude list here at the pre-commit level, same fix as mlframe's.
        exclude: (^|/)(tests|scripts|_benchmarks)/
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pyutilz-meta-tests
        name: "pyutilz meta-tests (alias / API / optional-deps / side effects)"
        entry: pytest tests/test_meta/ --no-cov -p no:randomly -q -x
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pyutilz-meta-tests-static-only
        name: "pyutilz meta-tests (static checks only — skip subprocess)"
        entry: >-
          pytest tests/test_meta/ --no-cov -p no:randomly -q -x
          --deselect tests/test_meta/test_optional_deps_isolation.py
          --deselect tests/test_meta/test_no_top_level_side_effects.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        stages: [manual]

  # Format + lint WARNINGS only -- ruff format --check + ruff check, never
  # rewrites and never blocks (always exits 0). Auto-reformat is intentionally
  # off (would churn large diffs that collide with concurrent work); run
  # ``ruff format`` / ``ruff check --fix`` manually to apply. Wrapper script lives in the
  # shared py_ci_shared package (fingoldo/py-ci-shared) -- `pip install -e ".[dev]"` installs it.
  #
  # NOTE: this wrapper also runs a filtered-Black --check pass, but ALWAYS exits 0 like every
  # other check bundled in it -- that made filtered-Black drift invisible locally even though
  # CI's Black workflow (black-filtered.yml) is a genuinely blocking gate (no continue-on-error).
  # The dedicated ``black-filtered-blocking`` hook right below is the real gate; this one is kept
  # only for its ruff-format/ruff-check taste warnings.
  - repo: local
    hooks:
      - id: format-lint-warn
        name: "format + lint (WARN only — never rewrites or blocks)"
        entry: python -m py_ci_shared.format_warn
        language: system
        types: [python]
        verbose: true
        stages: [pre-commit]

  # Black (filtered) -- BLOCKING. Mirrors black-filtered.yml (CI job has no continue-on-error,
  # confirmed by reading fingoldo/py-ci-shared's black-filtered.yml reusable workflow: the
  # `black_filtered_apply --check` step is a plain `run:` with no continue-on-error, so any
  # non-excluded-class Black finding fails the CI job and blocks merge). Previously the ONLY
  # local Black signal was buried inside format-lint-warn above, which always exits 0 -- so
  # filtered-Black drift landed in commits with zero local blocking and only surfaced later in
  # CI (see format-lint-warn's own comment, confirmed 2026-07-11: 5 files landed un-filtered-
  # Black-clean across several commits with zero local signal). This hook runs the EXACT command
  # CI runs and actually blocks the commit on any finding.
  - repo: local
    hooks:
      - id: black-filtered-blocking
        name: "black --check, filtered (blocking)"
        entry: python -m py_ci_shared.black_filtered_apply --config pyproject.toml --check
        language: system
        types: [python]
        stages: [pre-commit]

  # MyPy: scoped to the strict-mode beachhead (see [tool.mypy.overrides] in
  # pyproject.toml) -- dev.code_audit and stats, both verified clean 2026-07-06.
  # Expanding the files= regex is gated on a dedicated typing pass per subpackage,
  # same policy as mlframe. numpy pinned <2.5: 2.5+'s bundled .pyi stubs use PEP 695
  # `type` statements that mypy rejects under python_version="3.10".
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        files: '^src/pyutilz/(dev/code_audit|stats)/'
        additional_dependencies: ['numpy<2.5']

  # Security-lint gate: bandit -ll (medium+ severity). Blocking since 2026-07-09 -- triaged to 0
  # findings (see the CI lint-blocking job), so this mirrors that CI gate exactly instead of only
  # warning locally and failing later in CI. Called directly (not through a warn-only wrapper).
  - repo: local
    hooks:
      - id: bandit-blocking
        name: "bandit security scan (blocking)"
        entry: python -m bandit -r src/pyutilz -ll
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # Dead-code gate: vulture --min-confidence 80. Blocking since 2026-07-09 -- triaged to 0
  # findings (see the CI lint-blocking job), so this mirrors that CI gate exactly.
  - repo: local
    hooks:
      - id: vulture-blocking
        name: "vulture dead-code scan (blocking)"
        entry: python -m vulture src/pyutilz scripts/vulture_whitelist.py --min-confidence 80
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # Docstring-coverage gate: 100% (see [tool.interrogate] in pyproject.toml). Blocking since
  # 2026-07-09, mirroring the CI lint-blocking job -- a missing docstring on a new function
  # fails the commit immediately instead of surfacing only in CI.
  - repo: local
    hooks:
      - id: interrogate-blocking
        name: "interrogate docstring coverage (blocking, 100%)"
        entry: python -m interrogate --fail-under 100 src/pyutilz
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # Dependency-drift gate: deptry (unused/missing/transitive). Blocking since 2026-07-09,
  # mirroring the CI lint-blocking job -- see [tool.deptry] for the package_module_name_map +
  # per_rule_ignores this relies on. Assumes the local dev env has the [all,dev] extras
  # installed (same assumption CI makes via its explicit install step); deptry's DEP001/DEP002
  # are meaningless without a real environment to check imports against.
  - repo: local
    hooks:
      - id: deptry-blocking
        name: "deptry dependency check (blocking)"
        entry: python -m deptry .
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Workflow-YAML style gate: yamllint. Blocking since 2026-07-11, mirroring the CI
  # lint-blocking job -- catches the SHA-pin comment-spacing / indentation class of nit before
  # it ever reaches a push, on the same two paths CI checks. Same pattern as mlframe's hook.
  - repo: local
    hooks:
      - id: yamllint-blocking
        name: "yamllint workflow files (blocking)"
        entry: python -m yamllint .github/workflows .pre-commit-config.yaml
        language: system
        pass_filenames: false
        files: '^(\.github/workflows/.*\.ya?ml|\.pre-commit-config\.yaml)$'
        stages: [pre-commit]

  # Workflow-security gate: zizmor (unpinned actions, template-injection, excessive
  # permissions, credential persistence in .github/workflows/*.yml). Blocking since 2026-07-11
  # -- this repo's own workflows were triaged to 0 findings alongside mlframe's (see ci.yml's
  # lint-blocking call, run-zizmor: true); mirrors that CI gate exactly.
  - repo: local
    hooks:
      - id: zizmor-blocking
        name: "zizmor workflow security scan (blocking)"
        entry: uvx zizmor .
        language: system
        pass_filenames: false
        files: '^\.github/workflows/.*\.ya?ml$'
        stages: [pre-commit]

  # Advisory-taste warn-only gate: unrestricted-select ruff (surfaces everything the blocking
  # gate's --ignore C901 hides) + mccabe complexity (C90) + pip-audit (dependency CVE feed).
  # Mirrors lint-advisory.yml's own posture exactly -- everything here is continue-on-error in CI
  # (design taste / a feed whose fix isn't always on your own timeline, not a correctness bug),
  # so this hook never blocks either; it just surfaces the same signal locally instead of only
  # in CI. Same pattern as mlframe's hook.
  - repo: local
    hooks:
      - id: lint-advisory-warn
        name: "ruff (full-select) + mccabe complexity + pip-audit (advisory, warn-only)"
        entry: python -m py_ci_shared.advisory_warn --src-path src/pyutilz
        language: system
        types: [python]
        verbose: true
        stages: [pre-commit]

  # Whole-project mypy, MANUAL stage only (heavier than the fast beachhead hook above -- see
  # py-ci-shared's own .pre-commit-hooks.yaml for the full rationale). Mirrors CI's
  # mypy-full.yml exactly (same `mypy src/pyutilz` invocation) -- still useful to run in full
  # on demand: `pre-commit run --hook-stage manual mypy-full-manual`.
  - repo: https://github.com/fingoldo/py-ci-shared
    rev: v1.0.0
    hooks:
      - id: mypy-full-manual
        args: ['src/pyutilz']

  # Whole-project mypy, WARN-only, runs on every commit. Verified 2026-07-12: mypy-full.yml's
  # reusable workflow does `continue-on-error: ${{ inputs.advisory }}` and pyutilz's mypy-full.yml
  # sets `advisory: true` because the whole-project backlog is not yet closed to 0 (unlike
  # mlframe, which sets `advisory: false` and is a real blocking gate there) -- so this is
  # genuinely NOT a hard-blocking CI gate for pyutilz right now, and making it a local hard
  # blocker would be STRICTER than CI itself, not matching it. It was previously stages:[manual]
  # only, i.e. it never ran automatically at all, so mypy errors were invisible locally until
  # someone ran it by hand or CI's advisory annotation surfaced them after the fact. This hook
  # makes it run on every commit like CI does, printing findings as warnings, without blocking --
  # once the backlog is triaged to 0, flip `advisory: false` in mypy-full.yml AND swap this for a
  # real blocking hook (mirroring the black-filtered-blocking pattern above).
  - repo: local
    hooks:
      - id: mypy-full-warn
        name: "mypy (whole project, WARN only — mirrors CI's advisory: true)"
        entry: python scripts/mypy_full_warn.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
