site_name: pyutilz
site_description: A Python utilities library covering data-frame ops, databases, web/cloud, system monitoring, parallelism, and a unified async LLM-provider interface.
site_author: Anatoly Alexeev
site_url: https://fingoldo.github.io/pyutilz/
repo_url: https://github.com/fingoldo/pyutilz
repo_name: fingoldo/pyutilz
copyright: Copyright &copy; Anatoly Alexeev — MIT License

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

nav:
  - Home: index.md
  - Modules: modules.md
  - Guides:
      - Unified LLM provider interface: guides/llm_providers.md
      - Kernel tuning cache: guides/kernel_tuning_cache.md
      - Safe pickle & sidecar verification: guides/safe_pickle.md
